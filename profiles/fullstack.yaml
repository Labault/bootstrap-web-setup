# Profile: fullstack
# Symfony + JS/TS front. Inherits symfony (and therefore minimal) and adds the
# front tooling. Husky lives here only, never on a pure-PHP project (§11.1).

extends: symfony

# Machine-global binaries only. eslint/prettier live in the project's
# node_modules/.bin (installed via npm), so they are suggestions, not hard
# requirements. See suggest_npm below.
requires_bin:
  - node

# suggest_npm: front dev deps. Commit-message linting is a deposited shell script,
# so nothing is inherited here. bootstrap never edits package.json (§5.3/§10);
# it only prints the command to run.
suggest_npm:
  - eslint
  - "@eslint/js"
  - typescript
  - typescript-eslint
  - globals
  - prettier
  - husky
  - lint-staged

files:
  # Override: Husky owns git hooks here, so `make hooks` activates Husky instead
  # of running `pre-commit install` (which refuses when core.hooksPath is set).
  - src: templates/fullstack/Makefile
    dest: Makefile
  - src: templates/fullstack/eslint.config.js
    dest: eslint.config.js
  - src: templates/fullstack/tsconfig.json
    dest: tsconfig.json
  - src: templates/fullstack/.prettierrc
    dest: .prettierrc
  - src: templates/fullstack/.prettierignore
    dest: .prettierignore
  - src: templates/fullstack/.lintstagedrc.json
    dest: .lintstagedrc.json
  - src: templates/fullstack/.husky/pre-commit
    dest: .husky/pre-commit
  - src: templates/fullstack/.husky/commit-msg
    dest: .husky/commit-msg
  # Front CI (added alongside ci.yml and php.yml)
  - src: templates/fullstack/front.yml
    dest: .github/workflows/front.yml
  # Override: add the npm ecosystem on top of github-actions + composer
  - src: templates/fullstack/dependabot.yml
    dest: .github/dependabot.yml
