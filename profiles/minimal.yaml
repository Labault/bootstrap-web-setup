# Profile: minimal
# Any web repo, language-agnostic. The base layer every project gets.
# Read by bin/bootstrap via lib/manifest.sh (simple, line-oriented YAML).

# Commit-message linting (gitmoji + Conventional Commits) is a deposited,
# self-contained shell script (scripts/lint-commit-msg.sh) run as a commit-msg
# hook — self-contained, no npm dependency (mirrors mac-setup). minimal therefore
# suggests no npm packages.

# requires_bin: MACHINE-global binaries mac-setup must have installed for the
# deposited config to be live. Only tools that must exist on PATH go here — NOT
# project-local dev tools (those live in vendor/bin or node_modules/.bin and are
# surfaced as suggestions instead; see suggest_composer / suggest_npm).
requires_bin:
  - git
  - pre-commit
  - gitleaks
  - shellcheck
  - actionlint
  - markdownlint-cli2
  - lychee
  - editorconfig-checker

# files: src (relative to repo root) -> dest (relative to target project).
# strategy: replace (default) | merge-gitignore | merge-json
files:
  - src: templates/common/.editorconfig
    dest: .editorconfig
  - src: templates/common/.gitignore
    dest: .gitignore
    strategy: merge-gitignore
  - src: templates/common/.pre-commit-config.yaml
    dest: .pre-commit-config.yaml
  - src: templates/common/scripts/lint-commit-msg.sh
    dest: scripts/lint-commit-msg.sh
  - src: templates/common/.gitleaks.toml
    dest: .gitleaks.toml
  - src: templates/common/.shellcheckrc
    dest: .shellcheckrc
  - src: templates/common/.markdownlint-cli2.yaml
    dest: .markdownlint-cli2.yaml
  - src: templates/common/lychee.toml
    dest: lychee.toml
  - src: templates/common/Makefile
    dest: Makefile
  - src: templates/common/SECURITY.md
    dest: SECURITY.md
  - src: templates/common/CONTRIBUTING.md
    dest: CONTRIBUTING.md
  - src: templates/common/CLAUDE.md
    dest: CLAUDE.md
  - src: templates/common/.vscode/extensions.json
    dest: .vscode/extensions.json
    strategy: merge-json
  - src: templates/common/.github/workflows/ci.yml
    dest: .github/workflows/ci.yml
  - src: templates/common/.github/workflows/security.yml
    dest: .github/workflows/security.yml
  - src: templates/common/.github/dependabot.yml
    dest: .github/dependabot.yml
  - src: templates/common/.github/PULL_REQUEST_TEMPLATE.md
    dest: .github/PULL_REQUEST_TEMPLATE.md
  - src: templates/common/.github/ISSUE_TEMPLATE/bug_report.md
    dest: .github/ISSUE_TEMPLATE/bug_report.md
  - src: templates/common/.github/ISSUE_TEMPLATE/feature_request.md
    dest: .github/ISSUE_TEMPLATE/feature_request.md
