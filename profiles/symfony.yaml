# Profile: symfony
# PHP/Symfony project. Inherits everything from minimal and adds PHP tooling.

extends: minimal

# Machine-global binaries only. phpstan/php-cs-fixer/rector live in the project's
# vendor/bin (installed via composer require --dev), so they are suggestions, not
# hard requirements — see suggest_composer below.
requires_bin:
  - php
  - composer
  - hadolint

# suggest_composer: dev packages bootstrap suggests at the end of `apply`. It
# never edits composer.json (§5.3/§10); it only prints the command to run.
suggest_composer:
  - phpstan/phpstan
  - friendsofphp/php-cs-fixer
  - rector/rector

files:
  - src: templates/symfony/phpstan.dist.neon
    dest: phpstan.dist.neon
  - src: templates/symfony/.php-cs-fixer.dist.php
    dest: .php-cs-fixer.dist.php
  - src: templates/symfony/rector.php
    dest: rector.php
  - src: templates/symfony/.hadolint.yaml
    dest: .hadolint.yaml
