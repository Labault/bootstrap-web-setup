# Profile: shell
# Shell/Bash tooling repo (bootstrap itself, server-setup…). Inherits everything
# from minimal and adds shell-specific tooling: shfmt formatting and a bats test
# harness wired into CI.

extends: minimal

# Machine-global binaries only. shellcheck already comes from minimal, bats and
# shfmt are the additions. mac-setup installs them; bootstrap only declares them
# and deposits the config (hooks + CI) that drives them.
requires_bin:
  - bats
  - shfmt

files:
  # bats harness skeleton. The smoke test passes from the first run so
  # `bats tests/` is green immediately: bats errors on an empty tests/ dir.
  - src: templates/shell/tests/smoke.bats
    dest: tests/smoke.bats
  - src: templates/shell/tests/test_helper.bash
    dest: tests/test_helper.bash
  # Shell CI (added alongside the shared ci.yml, not replacing it)
  - src: templates/shell/tests.yml
    dest: .github/workflows/tests.yml
  # Overrides of common files that need shell-aware content (child wins by dest)
  - src: templates/shell/.pre-commit-config.yaml
    dest: .pre-commit-config.yaml
  - src: templates/shell/Makefile
    dest: Makefile
