name: Acceptance

# Bootstrap-specific gates that the generic `shell` profile (tests.yml) does NOT
# ship: the acceptance harness and the deposited-hook smoke tests that exercise
# the TOOL against throwaway projects. Unmanaged: not part of any deposited
# profile; lives here so the profile can own tests.yml (just `bats tests/`).

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validation:
    name: acceptance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # reconcile cases need the recorded commit (git show)

      - name: Ensure jq is available
        run: jq --version

      - name: Run the acceptance suite
        run: bash validation/run-all.sh

  smoke-php-hooks:
    # Scaffolds a throwaway Symfony project, deposits the symfony profile, and
    # runs the deposited PHP hooks (php-cs-fixer/phpstan/rector) against the
    # LATEST Composer tools, so a hook flag that drifts against a floating
    # binary fails here instead of in the next bootstrapped project.
    name: smoke (php hooks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer
          coverage: none

      - name: Install pre-commit
        run: pipx install pre-commit

      - name: Ensure jq is available
        run: jq --version

      - name: Smoke-test the deposited PHP hooks
        run: bash validation/smoke-php-hooks.sh

  smoke-js-hooks:
    # Scaffolds a throwaway fullstack project, deposits the fullstack profile,
    # and runs the deposited front gates (eslint/prettier/tsc/lint-staged)
    # against the LATEST npm tools, so a hardcoded command that drifts against a
    # floating binary fails here instead of in the next bootstrapped project.
    name: smoke (js hooks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Ensure jq is available
        run: jq --version

      - name: Smoke-test the deposited front gates
        run: bash validation/smoke-js-hooks.sh
