name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  bats:
    name: bats
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats (pinned)
        uses: bats-core/bats-action@3.0.1
        with:
          support-install: false
          assert-install: false
          detik-install: false
          file-install: false

      - name: Ensure jq is available
        run: jq --version

      - name: Run the test suite
        run: bats tests/
