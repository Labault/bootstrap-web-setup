name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  bats:
    name: bats
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq

      - name: Run the test suite
        run: bats tests/
