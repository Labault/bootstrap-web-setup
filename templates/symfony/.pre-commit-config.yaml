# Managed by bootstrap (symfony profile). Hooks run in `local` mode: they call
# binaries already available on your machine or the project (vendor/bin on PATH),
# not pinned remote repos.
# Activate with: pre-commit install && pre-commit install --hook-type commit-msg
minimum_pre_commit_version: "3.0.0"
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      # --- language-agnostic base ---
      - id: editorconfig-checker
        name: editorconfig-checker
        entry: editorconfig-checker
        language: system
        pass_filenames: false

      - id: gitleaks
        name: gitleaks (staged secrets)
        entry: gitleaks protect --staged --redact --verbose
        language: system
        pass_filenames: false

      - id: shellcheck
        name: shellcheck
        entry: shellcheck -x
        language: system
        types: [shell]

      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: markdownlint-cli2
        language: system
        types: [markdown]

      - id: actionlint
        name: actionlint
        entry: actionlint
        language: system
        files: ^\.github/workflows/.*\.(ya?ml)$

      - id: hadolint
        name: hadolint
        entry: hadolint
        language: system
        files: (?i)(^|/)dockerfile[^/]*$

      # --- PHP ---
      - id: php-cs-fixer
        name: php-cs-fixer
        entry: php-cs-fixer fix
        language: system
        types: [php]
        require_serial: true

      - id: phpstan
        name: phpstan
        entry: phpstan analyse --no-progress
        language: system
        types: [php]
        pass_filenames: false

      - id: rector
        name: rector (dry-run)
        entry: rector process --dry-run --no-progress
        language: system
        types: [php]
        pass_filenames: false

      # --- commit message ---
      - id: commit-msg-lint
        name: commit-msg-lint
        entry: scripts/lint-commit-msg.sh
        language: script
        stages: [commit-msg]
